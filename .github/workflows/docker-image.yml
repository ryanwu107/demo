name: Build and Push Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # file: docker/Dockerfile       # if the Dockerfile is not in repo root
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/demo:${{ github.sha }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/demo:latest
